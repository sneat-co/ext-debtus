name: Publish package

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    uses: sneat-co/cicd/.github/workflows/npm-publish.yml@main
    with:
      working-directory: frontend
      build-command: pnpm exec nx build ext-debtus-contract
      publish-command: pnpm exec nx release --yes && git push --follow-tags
